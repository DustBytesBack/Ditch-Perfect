name: flutter_test_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.1+6

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  uuid: ^4.3.3
  provider: ^6.1.2
  table_calendar: ^3.0.9
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  package_info_plus: ^8.0.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_markdown: ^0.7.7+1
  reorderable_grid_view: ^2.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/Ditch_Perfect_Icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/Ditch_Perfect_Icon.png"
  adaptive_icon_monochrome: "assets/icon/Ditch_Perfect_Icon.png"